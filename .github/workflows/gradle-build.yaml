name: Gradle Build and Run

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Verify Java Version
        run: java -version

      - name: Give Gradle Permissions
        run: chmod +x gradlew

      - name: Build Project with Gradle
        run: ./gradlew build

    #   - name: List Generated Files
    #     run: ls -lh target

      - name: Gradle Run
        run: ./gradlew run

